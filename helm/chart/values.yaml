palomar:
  controllers:

    backend:
      type: deployment
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
      containers:
        main:
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
          image:
            pullPolicy: Always
            repository: ghcr.io/bigbodycobain/palomar-backend
            tag: latest
          env:
            AIS_API_KEY:
              secretKeyRef:
                name: palomar-env
                key: AIS_API_KEY
            OPENSKY_CLIENT_ID:
              secretKeyRef:
                name: palomar-env
                key: OPENSKY_CLIENT_ID
            OPENSKY_CLIENT_SECRET:
              secretKeyRef:
                name: palomar-env
                key: OPENSKY_CLIENT_SECRET

    frontend:
      type: deployment
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 1
      containers:
        main:
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
          image:
            pullPolicy: Always
            repository: ghcr.io/bigbodycobain/palomar-frontend
            tag: latest

          env:
            BACKEND_URL: 'http://palomar-backend.palomar.svc.cluster.local:8000'

  service:
    backend:
      controller: backend
      type: ClusterIP
      ports:
        http:
          port: 8000
    frontend:
      controller: frontend
      type: ClusterIP
      ports:
        http:
          port: 3000
